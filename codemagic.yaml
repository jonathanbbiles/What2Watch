# Moodie — Codemagic cloud build → TestFlight (Capacitor iOS)
# Mirrors the working SlowBurn / ChordLoop pipeline. Automatic code signing via the
# App Store Connect API key integration "ChordLoopAPIKey" (same Apple team, so the
# same key creates/reuses the distribution certificate + provisioning profile).
workflows:
  ios-testflight:
    name: Moodie -> TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ChordLoopAPIKey
    environment:
      ios_signing:
        provisioning_profiles:
          - Moodie_AppStore_SharedDist
        certificates:
          - JB_Shared_Distribution
      groups:
        - tmdb
      vars:
        BUNDLE_ID: "com.jonathanbiles.moodie"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Inject TMDB API key
        script: |
          CLEAN_TMDB_KEY="$(printf '%s' "$TMDB_API_KEY" | tr -d '[:space:]')"; export CLEAN_TMDB_KEY
          if [ -n "$CLEAN_TMDB_KEY" ]; then
            perl -pi -e 's/__TMDB_API_KEY__/$ENV{CLEAN_TMDB_KEY}/g' www/index.html
            echo "TMDB API key injected into www/index.html (whitespace stripped)."
          else
            echo "TMDB_API_KEY not set - posters use the on-brand fallback cards."
          fi
      - name: Add + sync iOS platform (Capacitor)
        script: |
          [ -d ios ] || npx cap add ios
          npx cap sync ios
      - name: Ensure TMDB key in iOS bundle + verify
        script: |
          BUNDLE=ios/App/App/public/index.html
          CLEAN_TMDB_KEY="$(printf '%s' "$TMDB_API_KEY" | tr -d '[:space:]')"; export CLEAN_TMDB_KEY
          if [ -n "$CLEAN_TMDB_KEY" ]; then
            perl -pi -e 's/__TMDB_API_KEY__/$ENV{CLEAN_TMDB_KEY}/g' www/index.html "$BUNDLE" 2>/dev/null || true
          fi
          echo "TMDB_API_KEY raw length: ${#TMDB_API_KEY} | cleaned length: ${#CLEAN_TMDB_KEY}"
          case "$CLEAN_TMDB_KEY" in
            eyJ*) echo "TMDB key type: v4 Bearer token (JWT)";;
            "")   echo "TMDB key type: EMPTY (var not set / wrong group)";;
            *)    echo "TMDB key type: v3 api_key style";;
          esac
          if [ -f "$BUNDLE" ]; then
            if grep -q "__TMDB_API_KEY__" "$BUNDLE"; then echo "SHIPPED BUNDLE: placeholder STILL present (BAD)"; else echo "SHIPPED BUNDLE: real key present (good)"; fi
          else echo "SHIPPED BUNDLE: $BUNDLE not found"; fi
          # Empirical live TMDB request (proves the stored key works). Key value is NOT printed.
          if [ -n "$CLEAN_TMDB_KEY" ]; then
            case "$CLEAN_TMDB_KEY" in
              eyJ*) CODE=$(curl -s -o /tmp/tmdb_test.json -w '%{http_code}' -H "Authorization: Bearer $CLEAN_TMDB_KEY" "https://api.themoviedb.org/3/search/movie?query=Dune&year=2021");;
              *)    CODE=$(curl -s -o /tmp/tmdb_test.json -w '%{http_code}' "https://api.themoviedb.org/3/search/movie?query=Dune&year=2021&api_key=$CLEAN_TMDB_KEY");;
            esac
            echo "TMDB live request HTTP: $CODE"
            if grep -q '"poster_path"' /tmp/tmdb_test.json; then echo "TMDB poster_path returned: YES (images will work)"; else echo "TMDB poster_path returned: NO (key rejected or no match)"; fi
          fi
      - name: Embed the real app icon (replace Capacitor default)
        script: |
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          if [ -f appicon-1024.png ]; then
            rm -rf "$ICONSET"; mkdir -p "$ICONSET"
            cp appicon-1024.png "$ICONSET/AppIcon-1024.png"
            cat > "$ICONSET/Contents.json" <<'JSON'
          { "images": [ { "filename": "AppIcon-1024.png", "idiom": "universal", "platform": "ios", "size": "1024x1024" } ], "info": { "author": "xcode", "version": 1 } }
          JSON
            echo "Embedded Moodie app icon:"; ls -la "$ICONSET"
          else
            echo "No appicon-1024.png found — using Capacitor default icon."
          fi
      - name: Set build number + export-compliance flag
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "6788245223" 2>/dev/null || echo 0)
          NEXT=$(( LATEST + 1 ))
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEXT" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          echo "CFBundleVersion set to $NEXT (previous TestFlight latest: $LATEST)"
      - name: Set up code signing — apply the stored profile + the ONE shared cert (no mint, no revoke)
        script: |
          security find-identity -v -p codesigning || true
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
